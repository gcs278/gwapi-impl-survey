metadata:
  name: Cilium
  type: integrated
  dataplane: "eBPF (L3/L4) + Envoy (L7)"
  version_analyzed: "1.19.x stable / 1.20.0-dev (main branch), April 2026"
  repo_url: https://github.com/cilium/cilium
  docs_url: https://docs.cilium.io/en/stable/network/servicemesh/gateway-api/gateway-api/
  last_updated: 2026-04-17

api_stack:
  translation_model: intermediate
  layers:
    - name: Gateway API
      type: gwapi
      resources:
        - "HTTPRoute (no sessionPersistence support)"
        - "GRPCRoute (no sessionPersistence support)"
      description: |
        User-facing API. Cilium watches HTTPRoute, GRPCRoute, TLSRoute, and Gateway resources.
        As of Cilium 1.19/1.20-dev, the `sessionPersistence` field on HTTPRoute/GRPCRoute rules is
        NOT implemented. Cilium's Gateway API controller does not read or translate sessionPersistence.
    - name: Cilium Internal Model
      type: intermediate
      resources:
        - "operator/pkg/model.HTTPRoute (no session persistence fields)"
        - "CiliumEnvoyConfig (auto-generated from Gateway API resources)"
        - "Kubernetes Service sessionAffinity: ClientIP (L3/L4 eBPF path)"
      description: |
        Cilium's operator translates Gateway API resources into an internal `model.Model` which is
        then translated into `CiliumEnvoyConfig` (CEC) resources. The CEC is consumed by the
        cilium-agent to configure the per-node Envoy proxy. The internal model does NOT have session
        persistence fields. For L3/L4 session affinity (Kubernetes Service `sessionAffinity: ClientIP`),
        the eBPF datapath handles it directly in BPF maps without involving Envoy at all.
    - name: Envoy xDS (via CiliumEnvoyConfig)
      type: dataplane
      resources:
        - "Listener, RouteConfiguration, Cluster (generated by CEC translator)"
        - "envoy.filters.http.stateful_session (NOT BUILT into Cilium's Envoy proxy)"
        - "envoy.filters.http.router (included)"
        - "envoy.filters.http.grpc_web (included)"
      description: |
        Cilium's per-node Envoy proxy receives configuration via xDS from the cilium-agent. The
        Envoy binary is a custom minimal build (`cilium/proxy`) that EXCLUDES many upstream Envoy
        extensions. Critically, `envoy.filters.http.stateful_session` and its cookie/header session
        state extensions are ALL COMMENTED OUT in the build config, making L7 HTTP session persistence
        impossible without a custom proxy build. The eBPF datapath handles L3/L4 session affinity
        for Kubernetes Services via BPF affinity maps.

native_profile:
  overview: |
    Cilium is a CNCF Graduated eBPF-based networking, observability, and security platform for
    Kubernetes. Its architecture is unique among Gateway API implementations: it uses eBPF programs
    in the Linux kernel for L3/L4 networking (replacing kube-proxy) and a per-node Envoy proxy for
    L7 HTTP/gRPC traffic. This dual-dataplane architecture means session persistence exists at TWO
    distinct layers with different mechanisms:

    1. **L3/L4 Session Affinity (eBPF)**: Cilium implements Kubernetes Service `sessionAffinity:
       ClientIP` entirely in eBPF. Source IP-based affinity entries are stored in dedicated BPF maps
       (`cilium_lb4_affinity` / `cilium_lb6_affinity`) with a configurable timeout (default 3 hours).
       This is "weak" affinity that breaks when backends change. Maglev consistent hashing is also
       available at this layer for deterministic backend selection. This operates WITHOUT Envoy.

    2. **L7 Session Persistence (Envoy — NOT AVAILABLE)**: For HTTP/gRPC traffic routed through
       Envoy (Gateway API, Ingress), Cilium could theoretically use Envoy's `stateful_session`
       filter for cookie/header-based strong session persistence. However, this filter and ALL its
       session state extensions (cookie, header, envelope) are COMMENTED OUT in Cilium's custom
       Envoy proxy build (`cilium/proxy` repo, `extensions_build_config.bzl`). This means L7
       session persistence is not available in stock Cilium.

    The critical architectural distinction: eBPF handles L3/L4 traffic on the fast path (kernel
    space, no context switches). When L7 policies or Gateway API routes are configured, eBPF
    selectively redirects traffic to the per-node Envoy proxy via TPROXY. Envoy then handles HTTP
    routing, header manipulation, TLS termination, etc. For session persistence to work at the HTTP
    layer (cookies/headers), it must go through Envoy — but Cilium's Envoy build lacks the
    necessary filter.

    Cilium does NOT have any CRD or native API for configuring HTTP session persistence. The
    `CiliumEnvoyConfig` CRD allows custom Envoy configuration, but since the `stateful_session`
    filter is not compiled into the proxy binary, referencing it in a CEC would fail.

  mechanisms:
    - name: Kubernetes Service Session Affinity (eBPF L3/L4)
      type: soft_affinity
      description: |
        Cilium's eBPF kube-proxy replacement implements Kubernetes Service `sessionAffinity: ClientIP`.
        When enabled, connections from the same source IP to a service are routed to the same backend
        for a configurable timeout period (default 3 hours). The affinity is tracked in BPF maps
        (`cilium_lb4_affinity` with 65,536 entries by default). For in-cluster traffic with socket-LB
        enabled, the client's network namespace cookie is used instead of source IP. This is a "weak"
        form of affinity — backend changes, proxy restarts, or map eviction can break it.
      enabled_by_default: true
      configuration_method: "Kubernetes Service spec (`sessionAffinity: ClientIP`, `sessionAffinityConfig.clientIP.timeoutSeconds`)"

      config_options:
        - field: sessionAffinity
          type: "enum (None, ClientIP)"
          required: false
          default: "None"
          description: "Set on the Kubernetes Service resource. Only `ClientIP` is supported."
          support_level: full
        - field: sessionAffinityConfig.clientIP.timeoutSeconds
          type: integer
          required: false
          default: "10800 (3 hours)"
          description: "Affinity timeout in seconds. Each request resets the timer."
          support_level: full

      attachment_model:
        attaches_to: Service
        resource_type: "Kubernetes Service"
        scope: "per-service"

    - name: Maglev Consistent Hashing (eBPF L3/L4)
      type: soft_affinity
      description: |
        Cilium supports Maglev consistent hashing as an alternative to random backend selection for
        L3/L4 load balancing. Maglev uses a fixed-size lookup table (configurable, default 16381)
        to map 5-tuple hashes to backends. This provides deterministic backend selection across all
        nodes in the cluster without state synchronization. When backends are added/removed, only
        ~1% of assignments change. Combined with session affinity, Maglev skips the source port in
        its hash to respect ClientIP affinity. Maglev only applies to external (north-south) traffic.
      enabled_by_default: false
      configuration_method: "Helm value (`loadBalancer.algorithm=maglev`) or cilium-agent flag"

      config_options:
        - field: loadBalancer.algorithm
          type: "enum (random, maglev)"
          required: false
          default: "random"
          description: "Backend selection algorithm. Maglev provides consistent hashing."
          support_level: full
        - field: maglev.tableSize
          type: integer
          required: false
          default: "16381"
          description: "Maglev lookup table size. Must be a prime number. Larger values improve distribution."
          support_level: full
        - field: maglev.hashSeed
          type: "base64 string"
          required: true
          default: null
          description: "12-byte random seed (base64-encoded). Must be the same across all nodes. Generate with `head -c12 /dev/urandom | base64 -w0`."
          support_level: full

      attachment_model:
        attaches_to: Global
        resource_type: "Helm values / cilium-agent config"
        scope: "cluster-wide (all services using kube-proxy replacement)"

  attachment_points:
    - mechanism: Kubernetes Service Session Affinity (eBPF L3/L4)
      layer: backend_service
      native_resource: "Kubernetes Service (sessionAffinity: ClientIP)"
      description: |
        L3/L4 session affinity is configured on Kubernetes Service resources. Cilium's eBPF
        programs read the Service spec and maintain affinity entries in BPF maps. This operates
        entirely in kernel space without involving Envoy. The affinity source depends on request
        origin: external requests use source IP; internal requests with socket-LB use the network
        namespace cookie. There is NO per-route or per-gateway attachment for this mechanism.
    - mechanism: Maglev Consistent Hashing (eBPF L3/L4)
      layer: global
      native_resource: "Helm values / cilium-agent configuration"
      description: |
        Maglev is a cluster-wide setting that affects all services when enabled. It cannot be
        configured per-service or per-route. The algorithm selection and table size are global
        cilium-agent parameters. Maglev provides deterministic backend selection for north-south
        traffic, which serves as a form of connection-level affinity.

  gwapi_attachment:
    route_inline:
      target_layer: route_rule
      label: "not implemented"
      dataplane_target:
        name: "stateful_session filter (not built into Cilium Envoy proxy)"
        label: "would generate (if filter were available)"
    btp:
      target_layer: backend_service
      label: "not implemented"
      dataplane_target:
        name: "stateful_session filter (not built into Cilium Envoy proxy)"
        label: "would generate (if filter were available)"

  dataplane_translation:
    description: |
      Cilium's Gateway API translation follows a multi-stage pipeline:

      1. **Gateway API resources -> Internal Model**: The cilium-operator watches Gateway, HTTPRoute,
         GRPCRoute, TLSRoute, and ReferenceGrant resources. Valid resources are marked as accepted.
         The `operator/pkg/model/ingestion/gateway.go` package ingests Gateway API resources into
         the internal `model.Model` struct. This model does NOT include session persistence fields.

      2. **Internal Model -> CiliumEnvoyConfig**: The `operator/pkg/model/translation` package
         translates the Model into a `CiliumEnvoyConfig` (CEC) custom resource. The `CECTranslator`
         interface (`Translate(namespace, name, model) -> CiliumEnvoyConfig`) generates Envoy
         Listeners, RouteConfigurations, and Clusters. The translation uses a mutator pattern
         (`ListenerMutator`, `VirtualHostMutator`, `RouteConfigurationMutator`) for extensibility.
         Session persistence would need to be added as a new mutator and/or per-route
         `typed_per_filter_config` addition.

      3. **CiliumEnvoyConfig -> Envoy xDS**: The cilium-agent picks up CEC resources and pushes
         configuration to the per-node Envoy proxy via xDS over a Unix domain socket. The Envoy
         proxy applies the configuration and handles L7 traffic routing.

      For L3/L4 session affinity (Kubernetes Service `sessionAffinity: ClientIP`), the path is
      entirely different: the cilium-agent reads Service specs and programs eBPF maps directly.
      No Envoy involvement.

      The critical blocker for L7 session persistence is that `envoy.filters.http.stateful_session`
      and its session state extensions (`envoy.http.stateful_session.cookie`,
      `envoy.http.stateful_session.header`, `envoy.http.stateful_session.envelope`) are ALL
      commented out in `cilium/proxy`'s `envoy_build_config/extensions_build_config.bzl`. Even if
      the translation code were added to generate stateful_session config, the Envoy proxy would
      reject it as an unknown filter.
    envoy_features_used:
      - "envoy.filters.http.router (included in Cilium proxy build)"
      - "envoy.filters.http.grpc_web (included in Cilium proxy build)"
      - "envoy.filters.http.grpc_stats (included in Cilium proxy build)"
      - "envoy.filters.http.stateful_session (NOT included — commented out in build config)"
      - "envoy.http.stateful_session.cookie (NOT included — commented out)"
      - "envoy.http.stateful_session.header (NOT included — commented out)"
      - "envoy.http.stateful_session.envelope (NOT included — commented out)"
    key_code_paths:
      - "operator/pkg/model/model.go — internal model types (HTTPRoute struct with NO session persistence fields)"
      - "operator/pkg/model/ingestion/gateway.go — Gateway API resource ingestion into internal model"
      - "operator/pkg/model/translation/cec_translator.go — CiliumEnvoyConfig translator (Translate method)"
      - "operator/pkg/model/translation/envoy_virtual_host.go — Envoy VirtualHost/Route generation (no session logic)"
      - "operator/pkg/model/translation/envoy_http_connection_manager.go — HCM mutators (no stateful_session filter)"
      - "operator/pkg/gateway-api/cell.go — Gateway API controller module registration and config"
      - "operator/pkg/gateway-api/gateway_reconcile.go — Gateway reconciliation logic"
      - "pkg/datapath/loader/loader.go — eBPF program loading (session affinity BPF maps)"
      - "bpf/lib/lb.h — eBPF load balancer code with session affinity logic"
      - "cilium/proxy (separate repo) envoy_build_config/extensions_build_config.bzl — Envoy extension selection"
    flow: |
      L3/L4 Session Affinity (eBPF — AVAILABLE):
        Kubernetes Service (sessionAffinity: ClientIP)
          -> cilium-agent reads Service spec
            -> Programs BPF maps: cilium_lb4_services_v2, cilium_lb4_backends_v3, cilium_lb4_affinity
            -> eBPF program in bpf/lib/lb.h checks affinity map on packet arrival
            -> If affinity entry exists and backend is healthy, use cached backend
            -> Otherwise, select new backend (random or Maglev) and create affinity entry

      L7 Session Persistence (Envoy — NOT AVAILABLE):
        HTTPRoute.rule.sessionPersistence (NOT IMPLEMENTED in Cilium)
          -> Would need: operator/pkg/model/ingestion/gateway.go to read sessionPersistence field
            -> Would need: model.HTTPRoute to gain SessionPersistence field
            -> Would need: translation to generate StatefulSessionPerRoute typed_per_filter_config
            -> Would need: stateful_session filter added to HCM http_filters
            -> BLOCKED: envoy.filters.http.stateful_session NOT COMPILED into cilium-envoy binary

  capabilities:
    cookie_persistence: false   # stateful_session filter not available in Cilium's Envoy build
    header_persistence: false   # stateful_session filter not available in Cilium's Envoy build
    source_ip_affinity: true    # Via Kubernetes Service sessionAffinity: ClientIP (eBPF L3/L4)
    url_encoded_sessions: false
    cookie_attributes:
      name: false
      path: false
      domain: false
      ttl: false
      secure: false
      http_only: false
      same_site: false
    idle_timeout: false
    absolute_timeout: false
    lifetime_type_session: false
    lifetime_type_permanent: false

  limitations:
    - "No HTTP session persistence (cookie/header-based) — `envoy.filters.http.stateful_session` and all session state extensions are commented out in Cilium's custom Envoy proxy build (`cilium/proxy` repo)"
    - "No `sessionPersistence` field support on HTTPRoute or GRPCRoute — not implemented in Cilium's Gateway API controller"
    - "No `BackendLBPolicy` support — Cilium has no CRD or mechanism for service-level session persistence configuration"
    - "No native CRD for L7 session persistence — `CiliumEnvoyConfig` exists for custom Envoy config but the required filter is not compiled in"
    - "L3/L4 session affinity only supports source IP (`ClientIP`) — no cookie, header, or 5-tuple-based affinity at the eBPF layer"
    - "Maglev consistent hashing is cluster-wide, not per-service or per-route"
    - "Maglev only applies to external (north-south) traffic, not east-west"
    - "eBPF session affinity breaks when backends change (pods restart, scale up/down)"
    - "eBPF affinity map has a fixed size (default 65,536 entries) — exceeding it causes affinity failures"
    - "Auto-generated `CiliumEnvoyConfig` resources are reconciled on every HTTPRoute change, overwriting any manual patches users might add for custom Envoy config"
    - "Session affinity timeout (default 3 hours) is per-service, not per-route"
    - "The `--enable-session-affinity` flag was removed in Cilium 1.19 (issue #39583) — session affinity is now always enabled when kube-proxy replacement is active"

  known_issues:
    - url: "https://github.com/cilium/cilium/issues/33440"
      description: "LB IPAM Service Affinity — users report that `enable-session-affinity` is true but session affinity is not set on auto-generated services from Gateway API."
    - url: "https://github.com/cilium/cilium/issues/27096"
      description: "Terminating backend accepts new connections when session affinity is enabled — backends do not drain properly, leading to disrupted requests."
    - url: "https://github.com/cilium/cilium/issues/9076"
      description: "Original tracking issue for Kubernetes Service sessionAffinity support in Cilium (2019)."
    - url: "https://github.com/cilium/cilium/issues/33500"
      description: "CFP: Cilium Gateway API - more Gateway features. Closed as stale, but a comment notes that GEP-1619 (session persistence) has moved to experimental and should be tracked separately. Cilium maintainers stated: 'wait for features accepted in upstream first, then Cilium will plan to support them.'"
    - url: "https://github.com/cilium/proxy/blob/main/envoy_build_config/extensions_build_config.bzl"
      description: "Cilium proxy build config — `stateful_session` filter and all session state extensions (cookie, header, envelope) are commented out, preventing L7 session persistence."

gwapi_assessment:
  overview: |
    Cilium has NOT implemented Gateway API session persistence (`sessionPersistence` on
    HTTPRoute/GRPCRoute rules or `BackendLBPolicy`). This is blocked at TWO levels:

    1. **Controller level**: Cilium's Gateway API controller (`operator/pkg/gateway-api/` and
       `operator/pkg/model/`) does not read, parse, or translate the `sessionPersistence` field
       from HTTPRoute or GRPCRoute rules. The internal model (`model.HTTPRoute`) has no session
       persistence fields. The translation pipeline generates no stateful_session configuration.

    2. **Dataplane level**: Even if the controller code were added, Cilium's custom Envoy proxy
       build (`cilium/proxy` repo) does NOT include the `envoy.filters.http.stateful_session`
       filter or any of its session state extensions (cookie, header, envelope). These are all
       explicitly commented out in `extensions_build_config.bzl`. The Envoy proxy would reject
       any configuration referencing these filters.

    Cilium's only session-related feature is L3/L4 source-IP-based session affinity via eBPF BPF
    maps, implementing Kubernetes Service `sessionAffinity: ClientIP`. This is conceptually
    different from GEP-1619's HTTP-layer session persistence (cookie/header-based).

    The Cilium project's stated approach is to "wait for features accepted in upstream first, then
    Cilium will plan to support them" (Issue #33500 comment from maintainer @sayboras). A community
    member noted in June 2025 that GEP-1619 has moved to experimental and asked whether a separate
    tracking issue should be created for adding support.

    Cilium does have a comprehensive conformance report for Gateway API v1.4.0 (Cilium 1.19.0-pre.2)
    passing all Core tests and many Extended features across GATEWAY-HTTP, GATEWAY-TLS, GATEWAY-GRPC,
    MESH-HTTP, and MESH-GRPC profiles. However, session persistence is not among the supported
    extended features.

  route_inline:
    difficulty: requires_dataplane_changes
    description: |
      Implementing `HTTPRoute.rule.sessionPersistence` requires changes at BOTH the controller
      and dataplane levels:

      **Dataplane changes (Cilium proxy build)**:
      1. Uncomment `envoy.filters.http.stateful_session` in `extensions_build_config.bzl`
      2. Uncomment `envoy.http.stateful_session.cookie` for cookie-based persistence
      3. Uncomment `envoy.http.stateful_session.header` for header-based persistence
      4. Rebuild the `cilium/proxy` binary and publish new container images
      5. This increases the Envoy binary size and attack surface — counter to Cilium's minimal-build philosophy

      **Controller changes (cilium-operator)**:
      1. Add `SessionPersistence` field to `model.HTTPRoute` in `operator/pkg/model/model.go`
      2. Parse `rule.SessionPersistence` from Gateway API HTTPRoute/GRPCRoute in
         `operator/pkg/model/ingestion/gateway.go`
      3. Add translation logic to generate `StatefulSessionPerRoute` typed_per_filter_config on
         Envoy routes in `operator/pkg/model/translation/envoy_virtual_host.go`
      4. Add a `HttpConnectionManagerMutator` to inject the disabled `stateful_session` filter
         into the HCM http_filters list in `envoy_http_connection_manager.go`
      5. Handle the Gateway API `sessionPersistence` sub-fields: `type` (Cookie/Header),
         `sessionName`, `absoluteTimeout`, `cookieConfig.lifetimeType`

      The work is significant because it touches two separate repositories (`cilium/cilium` and
      `cilium/proxy`) and requires a deliberate architectural decision to expand the Envoy build.
    mapping_strategy: |
      The mapping would follow the same pattern as other Envoy-based implementations:
      `HTTPRoute.rule.sessionPersistence` -> `StatefulSessionPerRoute` typed_per_filter_config
      on the Envoy route, with a disabled `StatefulSession` filter at the HCM level.

      However, Cilium's translation pipeline adds an extra indirection:
      Gateway API -> model.HTTPRoute (needs new field) -> CiliumEnvoyConfig (needs new config)
      -> Envoy xDS (needs stateful_session filter compiled in).

      The `RouteConfigurationMutator` or `VirtualHostMutator` pattern in the translation package
      could be extended to inject session persistence config per-route.
    gotchas:
      - "Requires rebuilding `cilium/proxy` with stateful_session extensions — this is a binary/image change, not just code"
      - "Cilium's minimal Envoy build philosophy may resist adding more extensions"
      - "The `CiliumEnvoyConfig` auto-reconciliation would overwrite any manual session persistence config added via CEC"
      - "Gateway API session persistence operates at L7 (HTTP) but Cilium's existing affinity is L3/L4 (eBPF) — these are completely separate code paths"
      - "Need to handle the case where both L3/L4 session affinity AND L7 session persistence are configured for the same service"
      - "`idleTimeout` would not be supported (Envoy limitation, same as all Envoy-based implementations)"
      - "Cilium's GAMMA (service mesh) support would also need session persistence for east-west traffic"
      - "Feature flag or experimental gate would likely be needed, consistent with Cilium's approach to new features"
    code_changes_needed:
      - "cilium/proxy: extensions_build_config.bzl — uncomment stateful_session, cookie, and header extensions"
      - "operator/pkg/model/model.go — add SessionPersistence field to HTTPRoute struct"
      - "operator/pkg/model/ingestion/gateway.go — parse sessionPersistence from Gateway API HTTPRoute/GRPCRoute"
      - "operator/pkg/model/translation/envoy_virtual_host.go — generate StatefulSessionPerRoute on routes"
      - "operator/pkg/model/translation/envoy_http_connection_manager.go — add stateful_session filter mutator"
      - "operator/pkg/model/translation/cec_translator.go — wire session persistence through CEC translation"
      - "Conformance test updates to claim HTTPRouteSessionPersistence extended feature"

  backend_traffic_policy:
    difficulty: requires_dataplane_changes
    description: |
      Cilium has no existing CRD or mechanism for per-service L7 session persistence. Implementing
      `BackendLBPolicy`-style session persistence would require:

      1. All the same dataplane changes as route-inline (uncomment stateful_session in proxy build)
      2. Either implement Gateway API's `BackendLBPolicy` resource directly, or add session
         persistence fields to an existing Cilium CRD
      3. Cilium does not have a `BackendConfigPolicy` or `TrafficPolicy` CRD — it relies on
         `CiliumEnvoyConfig` for custom Envoy configuration and Kubernetes Service annotations
         for L3/L4 settings
      4. The `CiliumEnvoyConfig` CRD could theoretically be used, but it is low-level (raw Envoy
         config) and not user-friendly for session persistence
      5. A new CRD or annotation-based approach would likely be needed

      The difficulty is compounded by the fact that Cilium's Gateway API controller generates
      CEC resources automatically, and these are reconciled on every route change. Adding
      service-level session persistence would need to integrate with this reconciliation loop.
    mapping_strategy: |
      Option A: Implement Gateway API `BackendLBPolicy` directly. The operator would watch
      BackendLBPolicy resources targeting Services and inject stateful_session config into the
      auto-generated CEC for routes referencing those Services.

      Option B: Add a Cilium-specific CRD (e.g., `CiliumLoadBalancerPolicy`) that targets Services
      and configures session persistence. This would be similar to how `CiliumEnvoyConfig` works
      but at a higher abstraction level.

      Option C: Use annotations on Kubernetes Services (similar to how Cilium already uses
      `service.cilium.io/affinity` for cluster mesh affinity). This is the simplest approach
      but least aligned with Gateway API patterns.
    gotchas:
      - "Same dataplane blocker as route-inline — stateful_session filter must be compiled into proxy"
      - "Cilium has no existing per-service L7 configuration CRD — need to create one or implement BackendLBPolicy"
      - "Precedence between service-level and route-level session persistence needs careful design"
      - "Auto-generated CEC reconciliation could conflict with service-level session persistence config"
      - "L3/L4 session affinity (Service.sessionAffinity: ClientIP) and L7 session persistence operate at different layers"
    code_changes_needed:
      - "All proxy build changes from route-inline"
      - "New CRD or BackendLBPolicy controller in operator/pkg/gateway-api/"
      - "Integration with CEC auto-generation to inject stateful_session config at service level"
      - "Precedence logic for route-inline vs service-level session persistence"

  field_mapping:
    - gwapi_field: "type: Cookie"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to `CookieBasedSessionState` in Envoy's stateful_session filter, but the filter is not compiled into Cilium's proxy."
    - gwapi_field: "type: Header"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to `HeaderBasedSessionState` in Envoy's stateful_session filter, but the filter is not compiled into Cilium's proxy."
    - gwapi_field: "sessionName"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to cookie name or header name in stateful_session config."
    - gwapi_field: "cookie.lifetimeType: Session"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to cookie TTL=nil in stateful_session."
    - gwapi_field: "cookie.lifetimeType: Permanent"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to cookie with TTL from absoluteTimeout."
    - gwapi_field: "absoluteTimeout"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No native equivalent. Would map to cookie TTL duration. Cilium's L3/L4 affinity has `sessionAffinityConfig.clientIP.timeoutSeconds` but this is a different concept."
    - gwapi_field: "idleTimeout"
      native_field: null
      mapping_difficulty: not_supported
      notes: "Not supported in any Envoy-based implementation. Would be silently ignored even if stateful_session were available."
    - gwapi_field: "cookie path (computed)"
      native_field: null
      mapping_difficulty: not_supported
      notes: "No HTTP session persistence support. Cilium uses eBPF for L3/L4 and a custom minimal Envoy for L7, but the stateful_session filter is excluded from Cilium's Envoy build."

  deviations:
    - "Cilium has NO L7 HTTP session persistence — only L3/L4 source IP affinity via eBPF"
    - "The `stateful_session` Envoy filter is not compiled into Cilium's custom Envoy proxy build"
    - "Cilium's session affinity operates at the kernel/eBPF layer, completely separate from the Envoy L7 proxy path"
    - "No CRD, annotation, or configuration surface exists for HTTP session persistence"
    - "Cilium's Gateway API model (`operator/pkg/model`) has no session persistence fields"
    - "The CiliumEnvoyConfig CRD allows custom Envoy config but cannot reference the stateful_session filter since it is not compiled in"
    - "Maglev consistent hashing is global (all services), not configurable per-service or per-route"
    - "Cilium's approach to Gateway API features is to wait for upstream standardization before implementing — session persistence is not yet prioritized"
    - "The dual-dataplane architecture (eBPF + Envoy) means session persistence implementation must carefully consider which layer handles it"

  overall_difficulty: requires_dataplane_changes
  summary: |
    Cilium is the most challenging implementation for GEP-1619 session persistence among the
    surveyed Gateway API implementations because:

    (1) **Dataplane blocker**: The `envoy.filters.http.stateful_session` filter and ALL session
        state extensions (cookie, header, envelope) are commented out in Cilium's custom Envoy
        proxy build (`cilium/proxy` repo). This is a deliberate choice to minimize binary size
        and attack surface. Enabling these requires changes to the separate `cilium/proxy`
        repository, rebuilding the Envoy binary, and publishing new container images.

    (2) **No controller support**: Cilium's Gateway API controller does not read, parse, or
        translate the `sessionPersistence` field from HTTPRoute/GRPCRoute rules. The internal
        model has no session persistence fields. The translation pipeline generates no
        stateful_session configuration. Multiple files across the operator need changes.

    (3) **No native API**: Unlike other implementations that have their own session
        persistence/affinity CRDs (Istio's `DestinationRule`, kgateway's `BackendConfigPolicy`),
        Cilium has no CRD or annotation for L7 session persistence. The only session-related
        feature is L3/L4 source IP affinity via eBPF.

    (4) **Architectural complexity**: Cilium's dual-dataplane (eBPF L3/L4 + Envoy L7)
        architecture means session persistence must be carefully designed. L3/L4 affinity (eBPF)
        and L7 persistence (Envoy) are completely separate code paths in different layers. The
        interaction between them (e.g., a Service with both ClientIP affinity and cookie-based
        persistence) needs clear semantics.

    (5) **Cultural/process barriers**: Cilium maintainers have stated they wait for upstream
        Gateway API features to be accepted before implementing them. The umbrella issue (#33500)
        for additional Gateway API features was closed as stale. There is no open tracking issue
        specifically for session persistence support.

    To implement GEP-1619, Cilium would need:
    - Changes to `cilium/proxy` repo (uncomment and rebuild with stateful_session extensions)
    - Changes to `cilium/cilium` repo (model, ingestion, translation, and controller updates)
    - New conformance test claims for the HTTPRouteSessionPersistence extended feature
    - Potentially a new CRD for BackendLBPolicy-style service-level persistence

    The existing L3/L4 source IP affinity via eBPF is conceptually related but architecturally
    distinct from GEP-1619's HTTP-layer session persistence. It cannot serve as a foundation
    for implementing GEP-1619 — a completely new L7 implementation is required.

    Cilium's conformance report (v1.4.0, Cilium 1.19.0-pre.2) shows strong Gateway API support
    across HTTP, TLS, gRPC, and Mesh profiles, but session persistence is not among the supported
    or claimed features. The dev branch (1.20.0-dev) targets Gateway API v1.5.1 but has not
    announced session persistence support.
