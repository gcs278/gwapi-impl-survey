metadata:
  name: NGINX
  type: dataplane_only
  dataplane: self
  version_analyzed: "1.30.0 stable / 1.29.8 mainline (April 2026); NGINX Plus R33"
  repo_url: https://github.com/nginx/nginx
  docs_url: https://nginx.org/en/docs/http/ngx_http_upstream_module.html
  last_updated: 2026-04-17

# NGINX is a dataplane — controllers generate nginx.conf to program it.
# There is no xDS-style API; config is static files reloaded via signals or the NGINX Agent.
api_stack:
  translation_model: direct
  layers:
    - name: nginx.conf
      type: dataplane
      resources:
        - "`upstream { sticky cookie ...; }` (cookie-based strong persistence)"
        - "`upstream { sticky route ...; }` (route-variable-based persistence)"
        - "`upstream { sticky learn ...; }` (server-side learned persistence)"
        - "`upstream { ip_hash; }` (source IP soft affinity)"
        - "`upstream { hash $key [consistent]; }` (generic hash-based soft affinity)"
      description: |
        NGINX is configured via static `nginx.conf` files. Controllers generate these files
        (typically via Go templates or Lua) and trigger a reload. Session persistence is
        configured in `upstream {}` blocks using the `sticky` directive (three methods) or
        the `ip_hash`/`hash` load balancing directives.

native_profile:
  overview: |
    NGINX provides five distinct session persistence mechanisms spanning two categories:

    **Strong persistence** (the `sticky` directive, three methods):
    1. `sticky cookie` — NGINX generates a session cookie containing a server identifier
       (MD5 hash of IP:port, or explicit `route` value). Subsequent requests with this cookie
       are routed directly to the identified server, bypassing the load balancer. Available in
       OSS since 1.29.6 and in NGINX Plus.
    2. `sticky route` — Routes based on a variable extracted from a cookie or URI (e.g.
       JSESSIONID). The variable is matched against `route=` parameters on `server` directives.
       Available in OSS since 1.29.6 and in NGINX Plus.
    3. `sticky learn` — NGINX learns session identifiers from upstream responses (typically
       cookies) and stores the session-to-server mapping in a shared memory zone. Subsequent
       requests with the same identifier are routed to the same server. Server-side state,
       no client-side cookie generation by NGINX. Available in OSS since 1.29.6 and in NGINX Plus.

    **Soft affinity** (load balancing directives):
    4. `ip_hash` — Uses the first three octets of IPv4 (or full IPv6) address to hash and
       select a server. Simple but breaks when clients share IPs (NAT, proxies) or IPs change
       (mobile). Available in OSS and Plus (always).
    5. `hash $key [consistent]` — Generic hash on any NGINX variable(s). The optional
       `consistent` parameter enables ketama consistent hashing, which minimizes remapping
       when servers are added/removed. Available in OSS and Plus (always).

    **Historical note:** Prior to NGINX 1.29.6 (March 2026), the entire `sticky` directive
    (all three methods) was available only in NGINX Plus (commercial subscription). NGINX 1.29.6
    open-sourced the `sticky` directive, the `route` and `drain` server parameters, making
    cookie-based session persistence available in OSS for the first time without third-party
    modules. The `sync` parameter for `sticky learn` (cluster-wide session synchronization)
    still requires the `ngx_stream_zone_sync_module`, which remains commercial-subscription-only.

    All persistence mechanisms are configured in the `upstream {}` block. There is no
    route-level or location-level session persistence configuration in NGINX — persistence
    is strictly a property of the upstream group (backend service).

  mechanisms:
    - name: StickyCookie
      type: strong_persistence
      description: |
        NGINX generates a session cookie on the first response from an upstream group. The
        cookie value is either:
        - A hexadecimal MD5 hash of the server's IP:port (or UNIX socket path), OR
        - The explicit `route=` parameter value from the `server` directive.

        On subsequent requests, NGINX reads the cookie and routes directly to the identified
        server, bypassing the load balancer. If the designated server is unavailable, a new
        server is selected as if the client was not bound.

        The cookie is generated by NGINX itself (not by the application). This is the simplest
        and most common `sticky` method.

        Available in NGINX OSS >= 1.29.6 and NGINX Plus.
      enabled_by_default: false
      configuration_method: "`sticky cookie` directive in `upstream {}` block"

      config_options:
        - field: "sticky cookie {name}"
          type: string
          required: true
          default: null
          description: "Cookie name. First positional parameter. Sets the name of the cookie to be set or inspected."
          support_level: full
        - field: "expires=time"
          type: "duration or `max`"
          required: false
          default: "session (browser session cookie)"
          description: "Cookie expiration time. Value `max` sets expiry to `31 Dec 2037 23:55:55 GMT`. Omitted = session cookie (expires when browser closes)."
          support_level: full
        - field: "domain=domain"
          type: string
          required: false
          default: "none (host-only cookie)"
          description: "Cookie `Domain` attribute. Can contain NGINX variables (since 1.11.5). Example: `domain=.example.com`."
          support_level: full
        - field: "path=path"
          type: string
          required: false
          default: "none"
          description: "Cookie `Path` attribute. Example: `path=/`."
          support_level: full
        - field: httponly
          type: flag
          required: false
          default: "not set"
          description: "Adds the `HttpOnly` attribute to the cookie (since 1.7.11). No value — presence enables it."
          support_level: full
        - field: secure
          type: flag
          required: false
          default: "not set"
          description: "Adds the `Secure` attribute to the cookie. No value — presence enables it."
          support_level: full
        - field: "samesite=strict|lax|none|$variable"
          type: "enum or variable"
          required: false
          default: "not set"
          description: "Adds the `SameSite` attribute to the cookie (since 1.19.4). Values: `Strict`, `Lax`, `None`, or an NGINX variable (since 1.23.3)."
          support_level: full

      attachment_model:
        attaches_to: "Upstream (backend service)"
        resource_type: "`upstream {}` block directive"
        scope: "per-upstream (all requests to this upstream group share the same sticky config)"

    - name: StickyRoute
      type: strong_persistence
      description: |
        Routes requests based on a variable value matched against `route=` parameters on
        `server` directives. The directive takes one or more NGINX variables as parameters;
        the first non-empty variable is used to find the matching server.

        Typical use case: extracting a route identifier from a Java `JSESSIONID` cookie
        (which embeds a route suffix like `.server1`) or from the request URI. The route
        identifier is matched against `server backend1 route=server1;` to select the server.

        Unlike `sticky cookie`, NGINX does not generate any cookies — it relies on the
        application server (or external mechanism) to embed route information in cookies or URIs.

        Available in NGINX OSS >= 1.29.6 and NGINX Plus.
      enabled_by_default: false
      configuration_method: "`sticky route` directive in `upstream {}` block"

      config_options:
        - field: "sticky route $variable1 [$variable2 ...]"
          type: "one or more NGINX variables"
          required: true
          default: null
          description: "Variables containing routing information. First non-empty variable is used. Commonly `$route_cookie` and `$route_uri` extracted via `map` blocks."
          support_level: full
        - field: "server ... route=string"
          type: string
          required: false
          default: "MD5 hash of IP:port"
          description: "Route identifier for the server. If not set, defaults to MD5 hash of IP:port. Matched against the extracted route variable."
          support_level: full

      attachment_model:
        attaches_to: "Upstream (backend service)"
        resource_type: "`upstream {}` block directive + `map` blocks for variable extraction"
        scope: "per-upstream"

    - name: StickyLearn
      type: strong_persistence
      description: |
        NGINX analyzes upstream server responses to learn session identifiers (typically from
        `Set-Cookie` headers) and stores the session-to-server mapping in a shared memory zone.
        On subsequent requests, NGINX looks up the session identifier (from request cookies)
        and routes to the learned server.

        This is the most sophisticated method: NGINX does not generate cookies. Instead, it
        passively observes application-set cookies and builds a server-side session table.
        One megabyte of shared memory stores approximately 4,000 sessions on 64-bit platforms.

        The `sync` parameter enables session table synchronization across NGINX cluster nodes
        (requires `ngx_stream_zone_sync_module`, which remains commercial-subscription-only).

        Available in NGINX OSS >= 1.29.6 and NGINX Plus. The `sync` parameter requires NGINX Plus.
      enabled_by_default: false
      configuration_method: "`sticky learn` directive in `upstream {}` block"

      config_options:
        - field: "create=$variable"
          type: "NGINX variable"
          required: true
          default: null
          description: "Variable indicating how new sessions are created, typically from upstream response. Example: `create=$upstream_cookie_JSESSIONID`. May be specified multiple times; first non-empty wins."
          support_level: full
        - field: "lookup=$variable"
          type: "NGINX variable"
          required: true
          default: null
          description: "Variable indicating how existing sessions are looked up, typically from client request. Example: `lookup=$cookie_JSESSIONID`. May be specified multiple times; first non-empty wins."
          support_level: full
        - field: "zone=name:size"
          type: "string:size"
          required: true
          default: null
          description: "Shared memory zone name and size for storing session-to-server mappings. 1 MB stores ~4,000 sessions on 64-bit platforms."
          support_level: full
        - field: "timeout=time"
          type: duration
          required: false
          default: "10m"
          description: "Sessions not accessed within this duration are removed. This is a true server-side idle timeout."
          support_level: full
        - field: header
          type: flag
          required: false
          default: "not set"
          description: "Allows creating a session right after receiving response headers (since 1.13.1), rather than waiting for the full response."
          support_level: full
        - field: sync
          type: flag
          required: false
          default: "not set"
          description: "Enables synchronization of the shared memory zone across cluster nodes (since 1.13.8). Requires `ngx_stream_zone_sync_module` (commercial subscription only)."
          support_level: "partial (sync requires Plus)"

      attachment_model:
        attaches_to: "Upstream (backend service)"
        resource_type: "`upstream {}` block directive"
        scope: "per-upstream (session table is per-zone, can be shared across upstreams using the same zone name)"

    - name: IPHash
      type: soft_affinity
      description: |
        Uses the client's IP address as a hashing key to select a server. For IPv4, only the
        first three octets are used (optimized for /24 subnets with dynamic IPs). For IPv6,
        the entire address is used.

        This is the simplest session affinity mechanism. It requires no cookies and works for
        any protocol. However, it is ineffective when many clients share the same IP (NAT,
        corporate proxies, VPNs) or when client IPs change (mobile networks).

        The `backup` parameter cannot be used with `ip_hash`.

        Available in NGINX OSS and Plus (always available, not gated behind any subscription).
      enabled_by_default: false
      configuration_method: "`ip_hash` directive in `upstream {}` block"

      config_options:
        - field: ip_hash
          type: flag
          required: true
          default: null
          description: "Enables source-IP-based hash load balancing. No parameters. Placed above `server` directives in the `upstream {}` block."
          support_level: full

      attachment_model:
        attaches_to: "Upstream (backend service)"
        resource_type: "`upstream {}` block directive"
        scope: "per-upstream"

    - name: HashConsistent
      type: soft_affinity
      description: |
        Generic hash-based load balancing on any NGINX variable or combination of variables.
        The hash key can be any text, variables, or their combinations (e.g. `$request_uri`,
        `$remote_addr`, `$cookie_sessionid`, `$arg_sessionid`).

        Without the `consistent` parameter, adding or removing a server remaps most keys.
        With `consistent`, ketama consistent hashing is used, minimizing remapping to ~1/N
        keys when servers change. The `consistent` parameter is recommended for session
        affinity use cases.

        The `backup` parameter cannot be used with `hash`.

        Available in NGINX OSS and Plus (always available, not gated behind any subscription).
      enabled_by_default: false
      configuration_method: "`hash` directive in `upstream {}` block"

      config_options:
        - field: "hash $key"
          type: "NGINX variable expression"
          required: true
          default: null
          description: "Hash key. Can be text, variables, or combinations. Examples: `$request_uri`, `$remote_addr`, `$cookie_jsessionid`, `$arg_session`."
          support_level: full
        - field: consistent
          type: flag
          required: false
          default: "not set (standard hash)"
          description: "Enables ketama consistent hashing. Minimizes remapping when servers are added/removed. Strongly recommended for session affinity."
          support_level: full

      attachment_model:
        attaches_to: "Upstream (backend service)"
        resource_type: "`upstream {}` block directive"
        scope: "per-upstream"

  attachment_points:
    - mechanism: StickyCookie
      layer: backend_service
      native_resource: "`upstream {}` block — `sticky cookie` directive"
      description: |
        Configured in the `upstream {}` block. Applies to all requests routed to this upstream
        group regardless of which `location` or `server` block they came from. There is no
        per-route override — persistence is a property of the upstream group.
    - mechanism: StickyRoute
      layer: backend_service
      native_resource: "`upstream {}` block — `sticky route` directive + `server` `route=` parameter"
      description: |
        Configured in the `upstream {}` block with `map` blocks to extract route variables.
        The `route=` parameter on each `server` directive maps route identifiers to servers.
    - mechanism: StickyLearn
      layer: backend_service
      native_resource: "`upstream {}` block — `sticky learn` directive"
      description: |
        Configured in the `upstream {}` block. Session-to-server mappings are stored in a
        shared memory zone. The zone can be referenced by multiple upstream blocks.
    - mechanism: IPHash
      layer: backend_service
      native_resource: "`upstream {}` block — `ip_hash` directive"
      description: |
        Configured in the `upstream {}` block. A single directive with no parameters.
    - mechanism: HashConsistent
      layer: backend_service
      native_resource: "`upstream {}` block — `hash` directive"
      description: |
        Configured in the `upstream {}` block. The hash key expression determines what is
        hashed. Can hash on cookies, headers, URI, source IP, query parameters, or any
        NGINX variable.

  # Ingress model mapping: how NGINX's config model maps to the standard
  # Client -> Gateway -> Route Rule -> Backend/Service -> Endpoint model
  ingress_model_mapping:
    client:
      nginx_concept: "Downstream connection (client request)"
      description: "The client connecting to NGINX's listening socket."
    gateway:
      nginx_concept: "`server {}` block (virtual server)"
      description: |
        A `server {}` block in the `http {}` context defines a virtual server that listens
        on a specific address:port and optionally matches by `server_name` (SNI/Host header).
        This is the Gateway/Listener equivalent. No session persistence is configured here.
      session_persistence_config: []
    route_rule:
      nginx_concept: "`location {}` block (within `server {}`)"
      description: |
        A `location {}` block matches requests by URI path (prefix, exact, regex) and
        specifies the upstream via `proxy_pass`. This is the Route/Rule equivalent.
        No session persistence is configured at this level in NGINX — persistence is
        always on the upstream (backend service), not the route.
      session_persistence_config: []
    backend_service:
      nginx_concept: "`upstream {}` block"
      description: |
        An `upstream {}` block defines a group of backend servers with a load balancing
        method. ALL session persistence configuration in NGINX lives here. The `sticky`
        directive (cookie/route/learn) and `ip_hash`/`hash` directives are all upstream-level.

        This is a key architectural difference from Envoy, where session persistence can be
        configured at both the route level (`hash_policy`) and the cluster level (`lb_policy`).
        In NGINX, it is exclusively at the upstream (cluster/service) level.
      session_persistence_config:
        - "`sticky cookie {name} [expires=...] [domain=...] [path=...] [httponly] [secure] [samesite=...];`"
        - "`sticky route $var1 [$var2 ...];`"
        - "`sticky learn create=$var lookup=$var zone=name:size [timeout=time] [header] [sync];`"
        - "`ip_hash;`"
        - "`hash $key [consistent];`"
    endpoint:
      nginx_concept: "`server` directive within `upstream {}` block"
      description: |
        Each `server` directive in an `upstream {}` block defines a backend endpoint
        (address:port or unix socket). The `route=` parameter assigns a route identifier
        for use with `sticky cookie` and `sticky route`. The `drain` parameter puts the
        server in draining mode (only serves existing sticky sessions).

  dataplane_translation:
    description: |
      NGINX is the dataplane — there is no further translation. Controllers generate
      `nginx.conf` files (via Go templates, Lua, or other mechanisms) and trigger a
      reload via NGINX signals or the NGINX Agent. Session persistence requires
      configuring the `upstream {}` block with the appropriate `sticky` or `hash`/`ip_hash`
      directive.

      Unlike Envoy, NGINX has a single attachment point for session persistence: the
      `upstream {}` block. There is no split across route and cluster configuration.
      This simplifies the translation model for controllers but limits flexibility:
      you cannot have different session persistence policies for different routes to
      the same upstream.

      Key constraint: NGINX's `upstream {}` block can only have ONE load balancing method
      active at a time. You cannot combine `sticky cookie` with `ip_hash` on the same
      upstream. If you need different persistence for different routes, you must create
      separate upstream blocks (duplicating the server list).
    nginx_features_used:
      - "`sticky cookie` — cookie-based strong persistence (OSS >= 1.29.6, Plus)"
      - "`sticky route` — route-variable-based strong persistence (OSS >= 1.29.6, Plus)"
      - "`sticky learn` — server-side learned persistence (OSS >= 1.29.6, Plus)"
      - "`ip_hash` — source IP soft affinity (OSS, Plus — always available)"
      - "`hash $key [consistent]` — generic hash soft affinity (OSS, Plus — always available)"
      - "`server route=` — route identifier for sticky cookie/route (OSS >= 1.29.6, Plus)"
      - "`server drain` — draining mode for graceful removal (OSS >= 1.29.6, Plus)"
      - "`upstream zone` — shared memory for upstream state"
    key_code_paths:
      - "src/http/modules/ngx_http_upstream_hash_module.c — ip_hash and hash directives"
      - "src/http/ngx_http_upstream.h — upstream data structures"
      - "src/http/ngx_http_upstream.c — upstream processing, server selection"
      - "src/http/ngx_http_upstream_round_robin.c — base load balancing logic"
    flow: |
      StickyCookie:
        First request (no cookie):
          → normal LB selects server → NGINX generates Set-Cookie with MD5(ip:port) or route value
          → response includes cookie → client stores cookie
        Subsequent requests (cookie present):
          → NGINX reads cookie → matches to server → routes directly (bypasses LB)
          → if server unavailable → fall back to normal LB, new cookie generated

      StickyRoute:
        Request arrives:
          → NGINX evaluates variables ($route_cookie, $route_uri, etc.)
          → first non-empty variable matched against server route= parameters
          → if match found → route to that server
          → if no match → normal LB selection

      StickyLearn:
        First request (no session):
          → normal LB selects server → server responds with session cookie
          → NGINX captures session ID (create=$upstream_cookie_X)
          → stores session_id -> server mapping in shared memory zone
        Subsequent requests (session present):
          → NGINX extracts session ID (lookup=$cookie_X)
          → looks up server in zone → routes to learned server
          → if server unavailable → normal LB, new mapping created

      IPHash:
        → extract client IP → hash first 3 octets (IPv4) or full address (IPv6)
        → map hash to server → always same server for same IP

      HashConsistent:
        → evaluate hash key expression ($request_uri, $cookie_X, etc.)
        → compute hash → with 'consistent', use ketama ring → map to server
        → adding/removing servers remaps only ~1/N keys

  capabilities:
    cookie_persistence: true     # sticky cookie (OSS >= 1.29.6, Plus)
    header_persistence: false    # NGINX has no header-based session persistence
    source_ip_affinity: true     # ip_hash (OSS, Plus — always)
    url_encoded_sessions: false
    cookie_attributes:
      name: true               # First positional parameter of `sticky cookie`
      path: true               # `path=` parameter
      domain: true             # `domain=` parameter, supports variables
      ttl: true                # `expires=` parameter
      secure: true             # `secure` flag
      http_only: true          # `httponly` flag (since 1.7.11)
      same_site: true          # `samesite=strict|lax|none|$var` (since 1.19.4)
    idle_timeout: true         # `sticky learn` `timeout=` parameter (server-side, sticky learn only)
    absolute_timeout: false    # `expires=` is client-side cookie expiry, not server-side absolute timeout
    lifetime_type_session: true    # Omitting `expires=` creates a session cookie
    lifetime_type_permanent: true  # Setting `expires=` creates a persistent cookie

  limitations:
    - "Session persistence is exclusively at the `upstream {}` level — no per-route/per-location override"
    - "Only ONE load balancing method per `upstream {}` block — cannot combine `sticky cookie` with `ip_hash`"
    - "Different session persistence for different routes to the same backend requires duplicating the `upstream {}` block"
    - "Header-based session persistence is not supported — no mechanism to set or read headers for persistence"
    - "`ip_hash` uses only the first 3 octets of IPv4 — all clients in the same /24 subnet map to the same server"
    - "`ip_hash` is ineffective when clients share IPs (NAT, corporate proxies, VPNs) or IPs change (mobile)"
    - "`sticky cookie` values are plain MD5 hashes with no integrity protection — clients can forge values"
    - "`sticky learn` `sync` parameter requires `ngx_stream_zone_sync_module` (commercial subscription only)"
    - "`sticky learn` shared memory zone size limits the number of tracked sessions (~4,000 per MB on 64-bit)"
    - "`hash` without `consistent` remaps most keys when servers are added/removed — only use `consistent` for session affinity"
    - "The `backup` parameter cannot be used with `ip_hash`, `hash`, or `random` methods"
    - "No query-parameter-based session persistence (unlike Envoy's `hash_policy[].query_parameter`)"
    - "Config changes require a reload (SIGHUP) — no dynamic xDS-style updates (except NGINX Plus API for adding/removing servers)"

  known_issues: []

  # Availability matrix: which mechanisms are available in OSS vs Plus
  availability_matrix:
    - mechanism: StickyCookie
      nginx_oss: "available (>= 1.29.6)"
      nginx_plus: "available (always)"
      notes: "Open-sourced in 1.29.6 (March 2026). All cookie attributes supported in both."
    - mechanism: StickyRoute
      nginx_oss: "available (>= 1.29.6)"
      nginx_plus: "available (always)"
      notes: "Open-sourced in 1.29.6 along with `server route=` parameter."
    - mechanism: StickyLearn
      nginx_oss: "available (>= 1.29.6, no sync)"
      nginx_plus: "available (always, with sync)"
      notes: "Open-sourced in 1.29.6. The `sync` parameter requires `ngx_stream_zone_sync_module` (Plus only)."
    - mechanism: IPHash
      nginx_oss: "available (always)"
      nginx_plus: "available (always)"
      notes: "Always available in both. No subscription required."
    - mechanism: HashConsistent
      nginx_oss: "available (always)"
      nginx_plus: "available (always)"
      notes: "Always available in both. No subscription required."

# Dataplanes don't implement Gateway API, so no gwapi_assessment.
# Instead, we document which implementations use this dataplane and how.
downstream_implementations:
  - name: NGINX Gateway Fabric
    uses_mechanisms:
      - StickyCookie
      - IPHash
    notes: |
      The primary Gateway API controller for NGINX. Uses `sticky cookie` for cookie-based
      session persistence (Plus only as of v2.4.0, but OSS support possible now with 1.29.6+).
      Uses `ip_hash` for source-IP affinity via `UpstreamSettingsPolicy` CRD (OSS and Plus).
      Directly consumes Gateway API `sessionPersistence` field on `HTTPRoute`/`GRPCRoute` rules.
      Does not currently use `sticky route` or `sticky learn`.
  - name: NGINX Ingress Controller (kubernetes/ingress-nginx)
    uses_mechanisms:
      - StickyCookie
      - IPHash
      - HashConsistent
    notes: |
      The community Kubernetes NGINX Ingress Controller. Supports `sticky cookie` via
      `nginx.ingress.kubernetes.io/affinity: cookie` annotation. Uses Lua-based cookie
      generation (not native `sticky cookie` directive). Also supports `ip_hash` and `hash`
      via annotations. This is NOT the F5/NGINX Inc controller.
  - name: NGINX Ingress Controller (nginxinc/kubernetes-ingress)
    uses_mechanisms:
      - StickyCookie
      - StickyRoute
      - StickyLearn
      - IPHash
      - HashConsistent
    notes: |
      The F5/NGINX Inc Kubernetes Ingress Controller. Full access to NGINX Plus features
      via annotations and CRDs. Uses native `sticky cookie`/`route`/`learn` directives.
      GitHub issue #9291 tracks adding `sticky cookie` support for OSS now that 1.29.6
      open-sourced it.
  - name: Kong Gateway
    uses_mechanisms:
      - HashConsistent
    notes: |
      Kong uses NGINX (OpenResty/LuaJIT) as its dataplane but implements session persistence
      at the Lua level rather than using native NGINX `sticky` directives. Uses consistent
      hashing (`chash`) on cookies, headers, or other values via the upstream `hash_on`
      configuration. This is soft affinity, not strong persistence.
  - name: Apache APISIX
    uses_mechanisms:
      - HashConsistent
    notes: |
      APISIX uses NGINX (OpenResty/LuaJIT) as its dataplane networking layer but implements
      its own load balancing in Lua. Supports consistent hashing (`chash`) on cookies, headers,
      NGINX variables, and consumer identifiers. Does not use native NGINX `sticky` directives.
