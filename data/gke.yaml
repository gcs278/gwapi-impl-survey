  field_mapping:
    - gwapi_field: "type: Cookie"
      native_field: "GCPTrafficDistributionPolicy sessionAffinity.type: HTTP_COOKIE (hash-based) or GCPSessionAffinityFilter statefulGeneratedCookie (GSSA, strong)"
      mapping_difficulty: translation_needed
      notes: |
        Gateway API `type: Cookie` maps to either `HTTP_COOKIE` (hash-based, custom name/path/TTL)
        or GSSA stateful generated cookie (strong persistence, fixed name 'GSSA'). The choice
        depends on whether the user needs strong persistence (GSSA) or soft affinity (HTTP_COOKIE).
        Gateway API does not distinguish between these — the `type: Cookie` field implies strong
        persistence per GEP-1619.
    - gwapi_field: "type: Header"
      native_field: "GCPTrafficDistributionPolicy sessionAffinity.type: HEADER_FIELD with httpHeaderName"
      mapping_difficulty: translation_needed
      notes: |
        Gateway API `type: Header` maps to `HEADER_FIELD` affinity. However, `HEADER_FIELD` is
        hash-based (soft affinity), not strong persistence. The header value is hashed to select
        a backend, but the backend is not encoded in the response. This is a semantic mismatch
        with GEP-1619 which defines session persistence as strong.
    - gwapi_field: "sessionName"
      native_field: "GCPTrafficDistributionPolicy cookie.name (for HTTP_COOKIE) or httpHeaderName (for HEADER_FIELD)"
      mapping_difficulty: translation_needed
      notes: |
        Maps to `cookie.name` for HTTP_COOKIE or `httpHeaderName` for HEADER_FIELD. Not available
        for GENERATED_COOKIE (always 'GCLB'/'GCILB') or GSSA (always 'GSSA').
    - gwapi_field: "cookie.lifetimeType: Session"
      native_field: "cookieTtlSec = 0 or cookie.ttl = 0 (no Expires attribute, session cookie)"
      mapping_difficulty: direct
      notes: "TTL of 0 creates a session cookie. Behavior depends on client — browsers retain until session ends."
    - gwapi_field: "cookie.lifetimeType: Permanent"
      native_field: "cookieTtlSec > 0 or cookie.ttl with duration (persistent cookie with Expires)"
      mapping_difficulty: direct
      notes: "TTL > 0 creates a persistent cookie. Must be set from absoluteTimeout value."
    - gwapi_field: "absoluteTimeout"
      native_field: "cookieTtlSec (GCPBackendPolicy) or cookie.ttl (GCPTrafficDistributionPolicy) or cookieTtlSeconds (GSSA)"
      mapping_difficulty: direct
      notes: |
        Direct mapping to cookie TTL. Note maximum value constraints: GSSA max 86,400s (24h),
        regular cookie max 1,209,600s (2 weeks). Gateway API has no maximum constraint.
    - gwapi_field: "idleTimeout"
      native_field: null
      mapping_difficulty: not_supported
      notes: |
        NOT SUPPORTED. Google Cloud Load Balancer has NO idle/inactivity-based timeout for session
        affinity. The only timeout mechanism is cookie TTL (absolute timeout from creation). The
        backend service `timeoutSec` and connection idle timeout (600s default) are connection-level
        timeouts, not session affinity timeouts. There is no way to implement idleTimeout on
        Google Cloud Load Balancer infrastructure.
    - gwapi_field: "cookie path (computed)"
      native_field: "GCPTrafficDistributionPolicy cookie.path (for HTTP_COOKIE) or '/' default (GENERATED_COOKIE)"
      mapping_difficulty: direct
      notes: "Cookie path is configurable for HTTP_COOKIE via GCPTrafficDistributionPolicy. GENERATED_COOKIE always uses '/'."

  deviations:
    - "GKE does NOT support the upstream `sessionPersistence` field on HTTPRoute — uses GKE-specific CRDs instead"
    - "GKE uses GCPSessionAffinityFilter (ExtensionRef) for route-rule-level affinity instead of inline sessionPersistence"
    - "GKE has FOUR different CRDs for session affinity (GCPBackendPolicy, GCPTrafficDistributionPolicy, GCPSessionAffinityFilter, GCPSessionAffinityPolicy) — complex ecosystem"
    - "GSSA provides strong persistence (encodes destination host in cookie) but cookie name is fixed as 'GSSA' and TTL max is 24 hours"
    - "HEADER_FIELD affinity is hash-based (soft), not strong persistence — semantic mismatch with GEP-1619"
    - "Cookie TTL maximum is 2 weeks (1,209,600s) for regular cookies, 24 hours for GSSA — no 1-year defaults"
    - "No idleTimeout support — fundamentally not available on Google Cloud Load Balancer architecture"
    - "GCPTrafficDistributionPolicy session affinity is single-cluster only"
    - "Weighted traffic splitting takes precedence over session affinity — GKE-specific behavior"
    - "Cookie Secure, HttpOnly, SameSite, Domain attributes are not configurable"
    - "GCPBackendPolicy is considered legacy for session affinity — Google recommends GCPTrafficDistributionPolicy"
    - "STRONG_COOKIE_AFFINITY from the Compute API (with custom cookie name/path/TTL for strong persistence) is not exposed through GKE Gateway CRDs"

  overall_difficulty: significant
  summary: |
    GKE presents a SIGNIFICANT challenge for Gateway API session persistence (GEP-1619) because:

    (1) GKE does NOT support the upstream `sessionPersistence` field on HTTPRoute rules. Session
        affinity is exclusively configured via GKE-specific CRDs (GCPBackendPolicy,
        GCPTrafficDistributionPolicy, GCPSessionAffinityFilter, GCPSessionAffinityPolicy).

    (2) **idleTimeout is NOT supported and CANNOT be supported** on Google Cloud Load Balancers.
        The only timeout mechanism is cookie TTL (absolute timeout). There is no concept of an
        idle/inactivity-based session timeout in Google Cloud's load balancing infrastructure.
        This is a fundamental architectural limitation — not a feature gap that can be addressed
        by the GKE Gateway controller.

    (3) GKE has a fragmented session affinity model with FOUR different CRDs, each supporting
        different affinity types and attachment points. Mapping Gateway API's unified
        `SessionPersistence` struct to this ecosystem requires careful translation.

    (4) The GKE Gateway controller is closed-source — implementing upstream `sessionPersistence`
        support requires Google engineering effort and cannot be contributed by the community.

    (5) Semantic mismatches exist: GEP-1619 defines session persistence as "strong" (guaranteed
        routing to the same backend), but GKE's most flexible affinity types (HTTP_COOKIE,
        HEADER_FIELD, GENERATED_COOKIE) are hash-based (soft affinity). Only GSSA provides
        strong persistence, but it has a fixed cookie name ("GSSA") and a 24-hour TTL maximum.

    The positive aspects are:
    - GKE DOES have route-rule-level session affinity via GCPSessionAffinityFilter (ExtensionRef)
    - GKE DOES have service-level session affinity via multiple CRDs
    - Cookie TTL (absolute timeout) is well-supported with configurable values
    - GSSA provides genuine strong persistence (destination host encoded in cookie)
    - HTTP_COOKIE supports custom cookie name, path, and TTL
    - Header-based affinity is available (though hash-based, not strong)

    GKE conformance: GKE has submitted conformance reports for v1.1.0 (standard channel,
    GATEWAY_HTTP profile) for three GatewayClasses: `gke-l7-global-external-managed`,
    `gke-l7-regional-external-managed`, and `gke-l7-rilb`. Session persistence tests are not
    part of the standard channel conformance profile.

    GatewayClasses provided by GKE:
    - `gke-l7-global-external-managed` (global external Application LB)
    - `gke-l7-regional-external-managed` (regional external Application LB)
    - `gke-l7-rilb` (regional internal Application LB)
    - `gke-l7-gxlb` (classic global external LB)
    - `gke-l7-global-external-managed-mc` (multi-cluster global external)
    - `gke-l7-regional-external-managed-mc` (multi-cluster regional external)
    - `gke-l7-rilb-mc` (multi-cluster regional internal)
    - `gke-l7-gxlb-mc` (multi-cluster classic global external)
    - `gke-l7-cross-regional-internal-managed-mc` (cross-regional internal multi-cluster)
