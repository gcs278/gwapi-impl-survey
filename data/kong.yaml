  overall_difficulty: significant
  summary: |
    Kong is one of the MORE DIFFICULT implementations for GEP-1619 session persistence because:

    (1) Kong does NOT implement Gateway API `sessionPersistence` field at all — KIC/Kong Operator
        completely ignores the field on HTTPRoute and GRPCRoute rules.

    (2) Fundamental architectural mismatch — Gateway API `sessionPersistence` is per-route-rule,
        but Kong's session persistence (KongUpstreamPolicy) operates per-service (Upstream entity).
        A single Kong Upstream serves all routes targeting a Service, making per-rule persistence
        settings impossible without significant architectural changes.

    (3) Kong Enterprise requirement — the `sticky-sessions` algorithm (strong persistence) requires
        Kong Enterprise Gateway. Kong OSS only offers `consistent-hashing` (soft affinity).

    (4) Limited cookie attribute support — no TTL (absoluteTimeout), no Secure, HttpOnly, SameSite,
        Domain attributes on upstream cookies. These are fundamental GEP-1619 features that would
        require Kong Gateway dataplane changes.

    (5) No header-based strong persistence — `sticky-sessions` is cookie-only.

    (6) Going STALE — Kong Ingress Controller is going STALE in the v1.5 implementations page
        review (PR #4741), and all new development is moving to Kong Operator.

    The BackendLBPolicy approach (service-level attachment) is MORE feasible for Kong because it
    aligns with KongUpstreamPolicy's existing service-level attachment model. However, even for
    BackendLBPolicy, significant dataplane changes would be needed in Kong Gateway itself to
    support cookie TTL, attributes, and header-based persistence.

    Kong's existing session persistence (via KongUpstreamPolicy with sticky-sessions or
    consistent-hashing) is functional for basic use cases but lacks the granularity and
    configurability that GEP-1619 specifies. The Session plugin has richer cookie attribute
    support but serves a different purpose (authentication session management, not load
    balancing affinity).

    If Kong were to implement GEP-1619, the recommended approach would be:
    1. Start with BackendLBPolicy (aligns with existing service-level model)
    2. Map to KongUpstreamPolicy configuration (existing translation pipeline)
    3. Add cookie attribute support to Kong Gateway's Upstream entity
    4. Potentially add per-route overrides for route-inline sessionPersistence
    5. Implement in Kong Operator (not KIC, which is in maintenance mode)
